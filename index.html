<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover" />
    <meta name="theme-color" content="#f7f1e8" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-title" content="Pantry" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <title>Pantry Organizer</title>
    <link rel="manifest" href="./manifest.webmanifest" />
    <link rel="apple-touch-icon" href="./icon.svg" />
    <link rel="stylesheet" href="./styles.css?v=38" />
  </head>
  <body>
    <div class="app-shell">
      <header class="topbar">
        <div>
          <p class="eyebrow">Pantry</p>
          <h1>食材记录</h1>
        </div>
        <button class="icon-button" id="backupButton" type="button" aria-label="导入导出">
          <span aria-hidden="true">⇅</span>
        </button>
      </header>

      <nav class="app-tabs" id="appTabs" aria-label="页面" role="tablist">
        <button
          class="is-active"
          type="button"
          role="tab"
          data-tab="pantry"
          aria-controls="pantryView"
          aria-selected="true"
        >
          库存
        </button>
        <button type="button" role="tab" data-tab="meal" aria-controls="mealView" aria-selected="false">Meal Plan</button>
        <button type="button" role="tab" data-tab="recipes" aria-controls="recipesView" aria-selected="false">Recipes</button>
      </nav>

      <main>
        <div class="tab-view is-active" id="pantryView" data-tab-panel="pantry">
          <section class="capture-panel" aria-labelledby="captureTitle">
            <div class="capture-heading">
              <h2 id="captureTitle">添加食材</h2>
              <button class="voice-button" id="voiceButton" type="button">
                <span class="voice-dot" aria-hidden="true"></span>
                <span id="voiceLabel">语音</span>
              </button>
            </div>
            <textarea
              id="quickInput"
              rows="4"
              placeholder="例如：买了生抽明年三月过期，放厨房柜子，备注开封后冷藏"
            ></textarea>
            <div class="capture-actions">
              <button class="primary-button" id="parseButton" type="button">整理</button>
              <button class="ghost-button" id="clearInputButton" type="button">清空</button>
            </div>
          </section>

          <section class="draft-panel is-hidden" id="draftPanel" aria-labelledby="draftTitle">
            <div class="section-title-row">
              <h2 id="draftTitle">确认记录</h2>
              <button class="ghost-button compact" id="discardDraftButton" type="button">取消</button>
            </div>
            <div class="draft-list" id="draftList"></div>
            <button class="primary-button full-width" id="saveDraftButton" type="button">保存</button>
          </section>

          <section class="toolbar" aria-label="筛选和搜索">
            <label class="search-field">
              <span aria-hidden="true">⌕</span>
              <input id="searchInput" type="search" placeholder="搜索名称、备注、位置" />
            </label>
            <div class="segmented" id="statusFilter">
              <button class="is-active" type="button" data-status="all">全部</button>
              <button type="button" data-status="soon">快过期</button>
              <button type="button" data-status="expired">已过期</button>
            </div>
            <select id="categoryFilter" aria-label="分类筛选">
              <option value="all">所有分类</option>
            </select>
            <select id="locationFilter" aria-label="位置筛选">
              <option value="all">所有位置</option>
            </select>
            <select id="sortSelect" aria-label="排序方式">
              <option value="expiryAsc">过期最早</option>
              <option value="expiryDesc">过期最晚</option>
              <option value="nameAsc">名称 A-Z</option>
              <option value="updatedDesc">最近更新</option>
            </select>
          </section>

          <section class="summary-grid" aria-label="概览">
            <div>
              <span id="totalCount">0</span>
              <p>全部</p>
            </div>
            <div>
              <span id="soonCount">0</span>
              <p>30 天内</p>
            </div>
            <div>
              <span id="expiredCount">0</span>
              <p>已过期</p>
            </div>
          </section>

          <section class="items-section" aria-labelledby="itemsTitle">
            <div class="section-title-row">
              <h2 id="itemsTitle">库存</h2>
              <button class="ghost-button compact" id="addBlankButton" type="button">添加/拍照</button>
            </div>
            <div class="item-list" id="itemList"></div>
            <p class="empty-state" id="emptyState">还没有记录</p>
          </section>
        </div>

        <div class="tab-view" id="mealView" data-tab-panel="meal">
          <section class="meal-planner" aria-labelledby="mealPlannerTitle">
            <div class="section-title-row">
              <h2 id="mealPlannerTitle">一周 Meal Plan</h2>
              <div class="planner-actions">
                <button class="ghost-button compact" id="clearMealPlanButton" type="button">清空计划</button>
                <button class="ghost-button compact" id="clearMealNotesButton" type="button">清空备忘</button>
              </div>
            </div>
            <div class="meal-day-tabs" id="mealDayTabs" role="tablist" aria-label="选择星期"></div>
            <div class="meal-grid" id="mealGrid"></div>
            <div class="planner-notes-grid">
              <label class="planner-note">
                想吃什么
                <textarea id="mealIdeasNote" rows="8" placeholder="下周想吃的菜、灵感、剩菜安排"></textarea>
              </label>
              <label class="planner-note">
                要买什么
                <textarea id="shoppingNote" rows="8" placeholder="补货清单、临时想到的东西"></textarea>
              </label>
            </div>
          </section>
        </div>

        <div class="tab-view" id="recipesView" data-tab-panel="recipes">
          <div class="sub-tabs" id="recipeSubTabs" role="tablist" aria-label="菜谱页面">
            <button class="is-active" type="button" data-recipe-view="library" aria-selected="true">菜谱</button>
            <button type="button" data-recipe-view="planned" aria-selected="false">准备做</button>
          </div>
          <section class="recipe-capture" aria-labelledby="recipeCaptureTitle">
            <div class="section-title-row">
              <h2 id="recipeCaptureTitle">保存菜谱</h2>
              <button class="ghost-button compact" id="addRecipeButton" type="button">手动添加</button>
            </div>
            <textarea
              id="recipeLinkInput"
              rows="4"
              placeholder="粘贴小红书分享文案或链接"
            ></textarea>
            <div class="capture-actions">
              <button class="primary-button" id="saveRecipeLinkButton" type="button">编辑保存</button>
              <button class="ghost-button" id="clearRecipeLinkButton" type="button">清空</button>
            </div>
          </section>

          <section class="recipe-toolbar" aria-label="菜谱筛选">
            <label class="search-field">
              <span aria-hidden="true">⌕</span>
              <input id="recipeSearchInput" type="search" placeholder="搜索菜名、分类、食材、备注" />
            </label>
            <select id="recipeTagFilter" aria-label="分类筛选">
              <option value="all">所有分类</option>
            </select>
            <div class="recipe-backup-actions">
              <button class="ghost-button" id="exportRecipesButton" type="button">下载 JSON</button>
              <label class="file-button">
                导入 JSON
                <input id="importRecipesInput" type="file" accept="application/json,text/plain,.json,.txt" />
              </label>
            </div>
          </section>

          <section class="recipes-section" aria-labelledby="recipesTitle">
            <div class="section-title-row">
              <h2 id="recipesTitle">菜谱</h2>
              <span class="recipe-count" id="recipeCount">0</span>
            </div>
            <div class="recipe-list" id="recipeList"></div>
            <p class="empty-state" id="recipeEmptyState">还没有菜谱</p>
          </section>

          <section class="planned-recipes-section is-hidden" id="plannedRecipesView" aria-labelledby="plannedRecipesTitle">
            <div class="section-title-row">
              <h2 id="plannedRecipesTitle">准备做</h2>
              <span class="recipe-count" id="plannedRecipeCount">0</span>
            </div>
            <div class="planned-recipe-list" id="plannedRecipeList"></div>
            <p class="empty-state" id="plannedRecipeEmptyState">还没有准备做的菜谱</p>
          </section>
        </div>
      </main>
    </div>

    <dialog id="itemDialog">
      <form method="dialog" class="dialog-card" id="itemForm">
        <div class="section-title-row">
          <h2 id="dialogTitle">编辑</h2>
          <button class="icon-button small" id="closeItemDialogButton" type="button" aria-label="关闭">×</button>
        </div>
        <input type="hidden" id="itemId" />
        <input type="hidden" id="itemPhotoData" />
        <label>
          名称
          <input id="itemName" required autocomplete="off" />
        </label>
        <section class="photo-field" aria-label="物品图片">
          <div class="section-title-row">
            <h3>图片</h3>
            <label class="file-button compact">
              拍照/选图
              <input id="itemPhotoInput" type="file" accept="image/*" capture="environment" />
            </label>
          </div>
          <div class="photo-preview is-empty" id="photoPreview">
            <span>无图片</span>
            <img id="photoPreviewImage" alt="物品图片预览" />
          </div>
          <div class="photo-actions">
            <button class="ghost-button" id="removePhotoButton" type="button">移除图片</button>
          </div>
        </section>
        <div class="two-col">
          <label>
            分类
            <select id="itemCategory"></select>
            <input class="is-hidden custom-category-input" id="itemCustomCategory" autocomplete="off" placeholder="新分类" />
          </label>
          <label>
            过期日期
            <input id="itemExpireDate" type="date" />
          </label>
        </div>
        <div class="two-col">
          <label>
            数量
            <input id="itemQuantity" type="number" min="0" step="0.1" />
          </label>
          <label>
            单位
            <input id="itemUnit" autocomplete="off" />
          </label>
        </div>
        <label>
          位置
          <select id="itemLocation"></select>
        </label>
        <label>
          备注
          <textarea id="itemNotes" rows="3"></textarea>
        </label>
        <label class="checkbox-row">
          <input id="itemOpened" type="checkbox" />
          <span>已开封</span>
        </label>
        <div class="dialog-actions">
          <button class="danger-button" id="deleteItemButton" type="button">删除</button>
          <button class="primary-button" value="default" type="submit">保存</button>
        </div>
      </form>
    </dialog>

    <dialog id="recipeDialog">
      <form method="dialog" class="dialog-card" id="recipeForm">
        <div class="section-title-row">
          <h2 id="recipeDialogTitle">编辑菜谱</h2>
          <button class="icon-button small" id="closeRecipeDialogButton" type="button" aria-label="关闭">×</button>
        </div>
        <input type="hidden" id="recipeId" />
        <input type="hidden" id="recipeCoverData" />
        <label>
          菜名
          <input id="recipeTitle" required autocomplete="off" />
        </label>
        <label>
          链接
          <input id="recipeUrl" type="url" autocomplete="off" />
        </label>
        <section class="recipe-category-editor" aria-label="菜谱分类">
          <label>
            分类
            <input id="recipeCategoryInput" autocomplete="off" list="recipeCategoryOptions" placeholder="输入或选择分类" />
          </label>
          <button class="ghost-button compact" id="addRecipeCategoryButton" type="button">添加分类</button>
          <datalist id="recipeCategoryOptions"></datalist>
          <input type="hidden" id="recipeTags" />
          <div class="recipe-selected-tags" id="recipeSelectedTags"></div>
        </section>
        <section class="photo-field" aria-label="菜谱封面">
          <div class="section-title-row">
            <h3>封面</h3>
            <label class="file-button compact">
              上传封面
              <input id="recipeCoverInput" type="file" accept="image/*" />
            </label>
          </div>
          <div class="photo-preview is-empty" id="recipeCoverPreview">
            <span>无封面</span>
            <img id="recipeCoverPreviewImage" alt="菜谱封面预览" />
          </div>
          <div class="photo-actions">
            <button class="ghost-button" id="removeRecipeCoverButton" type="button">移除封面</button>
          </div>
        </section>
        <label>
          食材
          <textarea id="recipeIngredients" rows="4"></textarea>
        </label>
        <label>
          步骤
          <textarea id="recipeSteps" rows="5"></textarea>
        </label>
        <label>
          Notes
          <textarea id="recipeNotes" rows="3"></textarea>
        </label>
        <div class="dialog-actions">
          <button class="danger-button" id="deleteRecipeButton" type="button">删除</button>
          <button class="primary-button" value="default" type="submit">保存</button>
        </div>
      </form>
    </dialog>

    <dialog id="backupDialog">
      <form method="dialog" class="dialog-card">
        <div class="section-title-row">
          <h2>导入导出</h2>
          <button class="icon-button small" value="cancel" type="submit" formnovalidate aria-label="关闭">×</button>
        </div>
        <div class="backup-actions">
          <button class="primary-button" id="exportJsonButton" type="button">生成 JSON</button>
          <button class="ghost-button" id="downloadBackupButton" type="button">下载备份</button>
          <button class="ghost-button" id="importTextButton" type="button">从文本导入</button>
        </div>
        <p class="backup-status" id="backupStatus">JSON 备份会包含图片，主要作为 GitHub Sync 之外的 fallback。</p>
        <section class="sync-panel" aria-labelledby="syncTitle">
          <h3 id="syncTitle">GitHub Sync</h3>
          <div class="sync-grid">
            <label>
              Owner
              <input id="githubOwner" autocomplete="off" placeholder="cath0615" />
            </label>
            <label>
              Repo
              <input id="githubRepo" autocomplete="off" placeholder="pantry-organizer-data" />
            </label>
            <label>
              Branch
              <input id="githubBranch" autocomplete="off" placeholder="main" />
            </label>
            <label>
              File path
              <input id="githubPath" autocomplete="off" placeholder="pantry-data.json" />
            </label>
          </div>
          <label>
            Token
            <input id="githubToken" autocomplete="off" type="password" placeholder="fine-grained token, 只存在这台设备" />
          </label>
          <div class="sync-actions">
            <button class="ghost-button compact" id="saveSyncSettingsButton" type="button">保存设置</button>
            <button class="primary-button compact" id="syncUploadCurrentButton" type="button">上传当前</button>
            <button class="ghost-button compact" id="syncDownloadCurrentButton" type="button">同步当前</button>
            <button class="ghost-button compact" id="syncUploadButton" type="button">上传全部</button>
            <button class="ghost-button compact" id="syncDownloadButton" type="button">同步全部</button>
          </div>
          <p class="backup-status" id="syncStatus">单独同步会更快；全部同步仍会包含库存、Meal Plan 和 Recipes。</p>
        </section>
      </form>
    </dialog>

    <div class="toast" id="toast" role="status" aria-live="polite"></div>
    <script src="./app.js?v=38" type="module"></script>
  </body>
</html>
